name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - qa
          - prod
      agent_name:
        description: "Agent to deploy (name or 'all')"
        type: string
        default: "all"
      allow_destructive:
        description: "Allow destructive infrastructure changes"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}
    env:
      ENVIRONMENT: ${{ inputs.environment || 'dev' }}
      AGENT_NAME: ${{ inputs.agent_name || 'all' }}

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      # Stage 1: Validate agent target
      - name: Validate agent target
        if: env.AGENT_NAME != 'all'
        run: |
          python -c "
          import os, sys
          from agents.registry import REGISTRY
          target = os.environ['AGENT_NAME']
          try:
              REGISTRY.get_agent(target)
              print(f'[validate] Agent {target!r} found in registry')
          except KeyError as e:
              print(f'[validate] ✗ {e}', file=sys.stderr)
              sys.exit(1)
          "

      # Stage 2: Azure login via OIDC
      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # Stage 3: Build and push container image to ACR
      # Note: ACR_SUFFIX defaults to "azurecr.io" (commercial cloud).
      # For sovereign clouds, set ACR_SUFFIX repo variable:
      #   US Government: azurecr.us | China: azurecr.cn
      - name: Login to ACR
        run: az acr login --name ${{ vars.ACR_NAME }}

      - name: Build and push image
        run: |
          ACR_SUFFIX="${{ vars.ACR_SUFFIX || 'azurecr.io' }}"
          IMAGE="${{ vars.ACR_NAME }}.${ACR_SUFFIX}/agentframework:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

      # Stage 4: Deploy agent(s) via Bicep
      #
      # Each agent gets its own Bicep deployment (identity, ACR role,
      # Log Analytics, ACA environment, container app). The parameter
      # file provides environment defaults; per-agent overrides are
      # applied via --parameters on the CLI.
      #
      # Resources use deterministic names (e.g., ca-{appName}-{env})
      # so re-running is idempotent.
      #
      # Infrastructure: https://github.com/pkumar26/ACA-BICEP-Actions
      - name: Deploy agent(s) to ACA via Bicep
        env:
          AZURE_AI_PROJECT_ENDPOINT: ${{ vars.AZURE_AI_PROJECT_ENDPOINT }}
          AZURE_AI_SEARCH_ENDPOINT: ${{ vars.AZURE_AI_SEARCH_ENDPOINT }}
          AZURE_AI_SEARCH_INDEX_NAME: ${{ vars.AZURE_AI_SEARCH_INDEX_NAME }}
          AZURE_AI_SEARCH_SEMANTIC_CONFIG: ${{ vars.AZURE_AI_SEARCH_SEMANTIC_CONFIG }}
          AZURE_AI_SEARCH_INDEXES: ${{ vars.AZURE_AI_SEARCH_INDEXES }}
        run: |
          PARAM_FILE="infra/parameters.${ENVIRONMENT}.bicepparam"

          # Build appEnvVars JSON array — always include core vars,
          # conditionally add search vars when configured.
          build_env_vars() {
            local name="$1"
            local vars="[{\"name\":\"AGENT_NAME\",\"value\":\"${name}\"},{\"name\":\"AZURE_AI_PROJECT_ENDPOINT\",\"value\":\"${AZURE_AI_PROJECT_ENDPOINT}\"},{\"name\":\"ENVIRONMENT\",\"value\":\"${ENVIRONMENT}\"}"
            if [ -n "$AZURE_AI_SEARCH_ENDPOINT" ]; then
              vars="${vars},{\"name\":\"AZURE_AI_SEARCH_ENDPOINT\",\"value\":\"${AZURE_AI_SEARCH_ENDPOINT}\"}"
            fi
            if [ -n "$AZURE_AI_SEARCH_INDEX_NAME" ]; then
              vars="${vars},{\"name\":\"AZURE_AI_SEARCH_INDEX_NAME\",\"value\":\"${AZURE_AI_SEARCH_INDEX_NAME}\"}"
            fi
            if [ -n "$AZURE_AI_SEARCH_SEMANTIC_CONFIG" ]; then
              vars="${vars},{\"name\":\"AZURE_AI_SEARCH_SEMANTIC_CONFIG\",\"value\":\"${AZURE_AI_SEARCH_SEMANTIC_CONFIG}\"}"
            fi
            if [ -n "$AZURE_AI_SEARCH_INDEXES" ]; then
              vars="${vars},{\"name\":\"AZURE_AI_SEARCH_INDEXES\",\"value\":\"${AZURE_AI_SEARCH_INDEXES}\"}"
            fi
            vars="${vars}]"
            echo "$vars"
          }

          deploy_agent() {
            local name="$1"
            echo ""
            echo "=============================================="
            echo "[deploy] Deploying agent: $name"
            echo "=============================================="

            DEPLOY_NAME="agent-${name}-${ENVIRONMENT}-$(date +%Y%m%d%H%M%S)"

            ENV_VARS=$(build_env_vars "$name")

            # What-if preview
            echo "[deploy] Running what-if preview..."
            WHATIF_OUTPUT=$(az deployment group what-if \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --template-file infra/main.bicep \
              --parameters "$PARAM_FILE" \
              --parameters appName="$name" \
              --parameters containerImage="$IMAGE" \
              --parameters "appEnvVars=${ENV_VARS}" \
              --no-pretty-print 2>&1) || true

            echo "$WHATIF_OUTPUT"

            # Destructive change gate
            if echo "$WHATIF_OUTPUT" | grep -qi "Delete"; then
              if [ "${{ inputs.allow_destructive }}" != "true" ]; then
                echo "::error::[deploy] ✗ $name — what-if detected resource deletions. Set allow_destructive=true to override."
                exit 1
              fi
              echo "::warning::[deploy] $name — destructive changes detected but allow_destructive=true, proceeding."
            fi

            # Deploy
            echo "[deploy] Deploying infrastructure..."
            az deployment group create \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --template-file infra/main.bicep \
              --parameters "$PARAM_FILE" \
              --parameters appName="$name" \
              --parameters containerImage="$IMAGE" \
              --parameters "appEnvVars=${ENV_VARS}" \
              --name "$DEPLOY_NAME" \
              --mode Incremental

            # Capture outputs
            OUTPUTS=$(az deployment group show \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --name "$DEPLOY_NAME" \
              --query "properties.outputs" \
              --output json)

            FQDN=$(echo "$OUTPUTS" | jq -r '.containerAppFqdn.value')
            echo "[deploy] ✓ $name deployed → https://$FQDN"
          }

          if [ "$AGENT_NAME" = "all" ]; then
            AGENTS=$(python -c "from agents.registry import REGISTRY; print(' '.join(e.name for e in REGISTRY.list_agents()))")
            for agent in $AGENTS; do
              deploy_agent "$agent"
            done
          else
            deploy_agent "$AGENT_NAME"
          fi

      # Stage 5: Run integration tests
      - name: Install test dependencies
        run: uv sync --group dev

      - name: Run integration tests
        env:
          AZURE_AI_PROJECT_ENDPOINT: ${{ vars.AZURE_AI_PROJECT_ENDPOINT }}
        run: pytest tests/ -m integration -v
