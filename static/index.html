<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Chat</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --chat-bg: #ffffff;
      --user-bg: #e3f2fd;
      --agent-bg: #f5f5f5;
      --primary: #1976d2;
      --border: #e0e0e0;
      --text: #212121;
      --muted: #757575;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      background: var(--primary);
      color: white;
      padding: 14px 24px;
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header .status {
      font-size: 12px;
      font-weight: 400;
      opacity: 0.85;
      margin-left: auto;
    }
    #chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }
    .message {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
    }
    .message.user { align-items: flex-end; }
    .message.agent { align-items: flex-start; }
    .message .bubble {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 15px;
    }
    .message.user .bubble {
      background: var(--user-bg);
      border-bottom-right-radius: 4px;
    }
    .message.agent .bubble {
      background: var(--agent-bg);
      border-bottom-left-radius: 4px;
    }
    .message .label {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 4px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .typing {
      display: none;
      padding: 8px 0;
      color: var(--muted);
      font-size: 14px;
    }
    .typing.active { display: block; }
    #input-area {
      border-top: 1px solid var(--border);
      background: var(--chat-bg);
      padding: 16px 24px;
    }
    #input-area form {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
    }
    #input-area textarea {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 48px;
      max-height: 120px;
    }
    #input-area textarea:focus { border-color: var(--primary); }
    #input-area button {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    #input-area button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    #input-area button:hover:not(:disabled) { opacity: 0.9; }
    .welcome {
      text-align: center;
      color: var(--muted);
      padding: 60px 20px;
    }
    .welcome h2 { margin-bottom: 8px; color: var(--text); }
  </style>
</head>
<body>
  <header>
    <span>🤖 Agent Chat</span>
    <span class="status" id="agent-name">Loading...</span>
  </header>

  <div id="chat-container">
    <div class="welcome">
      <h2>Welcome</h2>
      <p>Type a message below to start chatting with the agent.</p>
    </div>
  </div>

  <div id="input-area">
    <form id="chat-form">
      <textarea id="user-input" placeholder="Type your message..." rows="1"
        autofocus></textarea>
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>

  <script>
    const chatContainer = document.getElementById("chat-container");
    const form = document.getElementById("chat-form");
    const input = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");
    const agentNameEl = document.getElementById("agent-name");

    let conversationHistory = [];

    // Load agent info
    fetch("/api/info")
      .then(r => r.json())
      .then(d => { agentNameEl.textContent = d.agent_name || "Agent"; })
      .catch(() => { agentNameEl.textContent = "Agent"; });

    function addMessage(role, text) {
      // Remove welcome message on first interaction
      const welcome = chatContainer.querySelector(".welcome");
      if (welcome) welcome.remove();

      const div = document.createElement("div");
      div.className = `message ${role}`;
      div.innerHTML = `
        <span class="label">${role === "user" ? "You" : "Agent"}</span>
        <div class="bubble">${escapeHtml(text)}</div>
      `;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    function escapeHtml(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    function setLoading(on) {
      sendBtn.disabled = on;
      sendBtn.textContent = on ? "..." : "Send";
    }

    // Auto-resize textarea
    input.addEventListener("input", () => {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
    });

    // Enter to send, Shift+Enter for newline
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.dispatchEvent(new Event("submit"));
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      addMessage("user", text);
      input.value = "";
      input.style.height = "auto";
      setLoading(true);

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        if (data.error) {
          addMessage("agent", `⚠️ Error: ${data.error}`);
        } else {
          addMessage("agent", data.response);
        }
      } catch (err) {
        addMessage("agent", `⚠️ Connection error: ${err.message}`);
      } finally {
        setLoading(false);
        input.focus();
      }
    });
  </script>
</body>
</html>
